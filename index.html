<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>2026년 정책기준 안내</title>
    <style>
        :root { --accent: #0b2f6b; --green: #31591f; --dark: #1f2937; --muted: #6b7280; --bg: #f6f8fb; }
        * { box-sizing: border-box; }
        body { margin: 0; font-family: 'Pretendard', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; background: var(--bg); color: var(--dark); display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .container { background: white; border: 1px solid #e5e7eb; border-radius: 18px; padding: 40px; box-shadow: 0 10px 28px rgba(0,0,0,.06); max-width: 600px; width: 100%; text-align: center; }
        h1 { font-size: 26px; margin-top: 0; margin-bottom: 5px; color: var(--accent); letter-spacing: -0.5px;}
        p { color: var(--muted); margin-bottom: 30px; font-size: 15px; letter-spacing: -0.3px;}
        h2 { font-size: 18px; color: var(--dark); margin: 25px 0 15px; text-align: left; padding-bottom: 8px; border-bottom: 2px solid #eef2ff; letter-spacing: -0.5px;}
        .links { display: flex; flex-direction: column; gap: 12px; }
        a { display: block; padding: 14px 20px; background: #eef2ff; color: #0b2f6b; text-decoration: none; border-radius: 12px; font-weight: 700; font-size: 15px; transition: all 0.2s ease; border: 1px solid #c7d2fe; text-align: left; position: relative; letter-spacing: -0.3px;}
        a::after { content: '→'; position: absolute; right: 20px; top: 50%; transform: translateY(-50%); color: #0b2f6b; opacity: 0.5; transition: all 0.2s ease; }
        a:hover { background: #0b2f6b; color: white; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(11, 47, 107, 0.2); }
        a:hover::after { color: white; opacity: 1; right: 15px; }
        .badge { display: inline-block; background: #0b2f6b; color: white; font-size: 11px; padding: 2px 6px; border-radius: 4px; margin-left: 8px; vertical-align: middle; font-weight: normal;}
        #login-container { background: white; border: 1px solid #e5e7eb; border-radius: 18px; padding: 40px; box-shadow: 0 10px 28px rgba(0,0,0,.06); max-width: 400px; width: 100%; text-align: center; }
        #login-container h1 { font-size: 22px; margin-bottom: 10px; }
        #login-container p { margin-bottom: 20px; font-size: 14px; }
        #login-container input { padding: 12px; border: 1px solid #c7d2fe; border-radius: 8px; width: 100%; font-size: 16px; margin-bottom: 10px; outline: none; box-sizing: border-box; font-family: inherit;}
        #login-container input:focus { border-color: #0b2f6b; }
        #login-container button { padding: 12px; background: #0b2f6b; color: white; border: none; border-radius: 8px; width: 100%; font-size: 16px; font-weight: 700; cursor: pointer; transition: all 0.2s ease; font-family: inherit;}
        #login-container button:hover { background: #08214a; }
        #error-msg { color: #dc2626; font-size: 13px; margin-bottom: 15px; display: none; margin-top: 0;}
        #main-content { display: none; }
    </style>
</head>
<body>
    <div id="login-container">
        <h1>보안 로그인</h1>
        <p>문서를 열람하려면 암호를 입력하세요.</p>
        <input type="password" id="pwd" placeholder="암호 입력" />
        <p id="error-msg">암호가 일치하지 않습니다.</p>
        <button onclick="checkPwd()">로그인</button>
    </div>

    <div class="container" id="main-content">
        <h1>2026년 정책기준 안내</h1>
        <p>열람하실 문서를 선택해 주세요.</p>
        
        <h2>4월 정책안내</h2>
        <div class="links">
            <a href="Customer_Promotion_Policy_2026_04.html">고객부문 프로모션 4월 정책 <span class="badge">웹문서</span></a>
            <a href="System_Security_Policy_2026_04.html">시스템보안 4월 정책안내 <span class="badge">웹문서</span></a>
        </div>

        <h2>5월 정책안내</h2>
        <div class="links">
            <a href="Customer_Promotion_Policy_2026_05.html">고객부문 프로모션 5월 정책 <span class="badge">웹문서</span></a>
            <a href="System_Security_Policy_2026_05.html">시스템보안 5월 정책안내 <span class="badge">웹문서</span></a>
        </div>
    </div>
    <script>
        function checkPwd() {
            var pwd = document.getElementById('pwd').value;
            if (pwd === '3867') {
                document.getElementById('login-container').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
            } else {
                document.getElementById('error-msg').style.display = 'block';
            }
        }
        document.getElementById('pwd').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                checkPwd();
            }
        });
    </script>
</body>
</html>
